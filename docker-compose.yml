# ============================================
# OpenSnek Docker Compose Configuration
# ============================================
# Built on DeepTutor — adds PostgreSQL, Redis, and multi-tenant support.
#
# Usage:
#   Production:  docker compose up -d
#   Development: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Build only:  docker compose build
#
# Prerequisites:
#   1. Run: python scripts/setup_wizard.py   (or copy .env.example to .env)
#   2. Optionally customize config/main.yaml and config/agents.yaml
# ============================================

services:
  # ============================================
  # PostgreSQL — Users, courses, enrollments, activity
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: opensnek-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opensnek
      POSTGRES_USER: ${POSTGRES_USER:-opensnek}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opensnek_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opensnek}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opensnek-network

  # ============================================
  # Redis — Session cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: opensnek-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opensnek-network

  # ============================================
  # OpenSnek (DeepTutor + OpenSnek layer)
  # ============================================
  deeptutor:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        # Pass backend port at build time for Next.js static optimization
        - BACKEND_PORT=${BACKEND_PORT:-8001}
    container_name: opensnek
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8001}:${BACKEND_PORT:-8001}"
      - "${FRONTEND_PORT:-3782}:${FRONTEND_PORT:-3782}"

    # Load environment variables from .env file
    env_file:
      - .env

    environment:
      # LLM Configuration (Required)
      - LLM_BINDING=${LLM_BINDING:-openai}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_HOST=${LLM_HOST}
      - DISABLE_SSL_VERIFY=${DISABLE_SSL_VERIFY:-false}
      # Embedding Configuration (Required for Knowledge Base)
      - EMBEDDING_BINDING=${EMBEDDING_BINDING:-openai}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-large}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - EMBEDDING_HOST=${EMBEDDING_HOST}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-3072}
      - EMBEDDING_MAX_TOKENS=${EMBEDDING_MAX_TOKENS:-8192}
      # TTS Configuration (Optional)
      - TTS_MODEL=${TTS_MODEL:-}
      - TTS_API_KEY=${TTS_API_KEY:-}
      - TTS_URL=${TTS_URL:-}
      - TTS_VOICE=${TTS_VOICE:-alloy}
      # Web Search Configuration (Optional)
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-perplexity}
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      # ============================================
      # Service Ports Configuration
      # ============================================
      - BACKEND_PORT=${BACKEND_PORT:-8001}
      - FRONTEND_PORT=${FRONTEND_PORT:-3782}
      # ============================================
      # API URL Configuration (Important for Cloud Deployment)
      # ============================================
      - NEXT_PUBLIC_API_BASE_EXTERNAL=${NEXT_PUBLIC_API_BASE_EXTERNAL:-}
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-}
      # ============================================
      # OpenSnek Configuration
      # ============================================
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-opensnek}:${POSTGRES_PASSWORD:-opensnek_secret}@postgres:5432/opensnek
      - REDIS_URL=redis://redis:6379/0
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:${FRONTEND_PORT:-3782}}
      - AZURE_AD_CLIENT_ID=${AZURE_AD_CLIENT_ID:-}
      - AZURE_AD_CLIENT_SECRET=${AZURE_AD_CLIENT_SECRET:-}
      - AZURE_AD_TENANT_ID=${AZURE_AD_TENANT_ID:-}
      - UNIVERSITY_NAME=${UNIVERSITY_NAME:-University}
      - NEXT_PUBLIC_UNIVERSITY_NAME=${UNIVERSITY_NAME:-University}

    volumes:
      # Mount local config directory (read-only)
      - ./config:/app/config:ro
      # Mount local data directory for persistence (read-write)
      # This ensures all outputs go to your local ./data directory
      - ./data/user:/app/data/user
      - ./data/knowledge_bases:/app/data/knowledge_bases

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-8001}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - opensnek-network

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
  redis_data:

# ============================================
# Networks
# ============================================
networks:
  opensnek-network:
    driver: bridge
